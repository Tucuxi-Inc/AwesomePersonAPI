services:
  db:
    image: postgres:15-alpine
    container_name: apapi-db
    environment:
      POSTGRES_USER: ${DB_USER:-apapi}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-apapi_secret}
      POSTGRES_DB: ${DB_NAME:-apapi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-apapi} -d ${DB_NAME:-apapi}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: apapi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: apapi-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-apapi}:${DB_PASSWORD:-apapi_secret}@db:5432/${DB_NAME:-apapi}
      - DATABASE_URL_SYNC=postgresql://${DB_USER:-apapi}:${DB_PASSWORD:-apapi_secret}@db:5432/${DB_NAME:-apapi}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3003}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
      - LLM_MODEL=${LLM_MODEL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
    ports:
      - "8003:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: apapi-celery
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-apapi}:${DB_PASSWORD:-apapi_secret}@db:5432/${DB_NAME:-apapi}
      - DATABASE_URL_SYNC=postgresql://${DB_USER:-apapi}:${DB_PASSWORD:-apapi_secret}@db:5432/${DB_NAME:-apapi}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
      - LLM_MODEL=${LLM_MODEL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info

  ollama:
    image: ollama/ollama:latest
    container_name: apapi-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: apapi-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: apapi-frontend
    environment:
      - VITE_API_URL=http://localhost:8003
    ports:
      - "3003:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 3000

volumes:
  postgres_data:
  redis_data:
  ollama_data:
